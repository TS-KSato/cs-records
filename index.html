<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カスタマーサポート回答補助ツール</title>
<style>
  /* 装飾は最小限。読みやすさ優先のシンプルな見た目にする。 */
  :root {
    --fg: #1a1a1a;
    --muted: #666;
    --border: #ccc;
    --accent: #2563a8;
    --accent-bg: #e8f0fa;
    --bg: #fafafa;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    color: var(--fg);
    background: var(--bg);
    line-height: 1.7;
    margin: 0;
    padding: 24px 16px;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.25rem;
    margin: 0 0 20px;
  }
  section { margin-bottom: 24px; }
  .section-label {
    font-size: 0.9rem;
    font-weight: bold;
    margin-bottom: 8px;
  }

  /* 選択軸（各軸の中は単一選択、軸どうしは独立） */
  .axis { margin-bottom: 14px; }
  .axis:last-child { margin-bottom: 0; }
  .axis-label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .opt-btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--fg);
    font-size: 0.95rem;
    cursor: pointer;
  }
  .opt-btn:hover { border-color: var(--accent); }
  .opt-btn.selected {
    border-color: var(--accent);
    background: var(--accent-bg);
    font-weight: bold;
  }

  /* 入力欄 */
  textarea {
    width: 100%;
    min-height: 140px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.95rem;
    line-height: 1.6;
    resize: vertical;
  }

  /* メインの操作ボタン */
  .primary-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
  }
  .primary-btn:hover { opacity: 0.9; }

  /* マスク確認ボタン（補助操作なので控えめな見た目） */
  .secondary-btn {
    padding: 10px 20px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: #fff;
    color: var(--accent);
    font-size: 0.95rem;
    cursor: pointer;
    margin-left: 8px;
  }
  .secondary-btn:hover { background: var(--accent-bg); }

  /* マスク後プレビュー */
  .mask-notice {
    font-size: 0.8rem;
    color: #b45309;
    margin: 12px 0 6px;
  }
  .mask-preview {
    min-height: 80px;
    padding: 12px;
    border: 1px dashed var(--border);
    border-radius: 6px;
    background: #fff;
    white-space: pre-wrap;
    color: var(--fg);
  }

  /* 出力欄 */
  .output-kind-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .output {
    min-height: 120px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    white-space: pre-wrap;
    color: var(--fg);
  }
  .output.placeholder { color: var(--muted); }

  /* フィードバック */
  .feedback {
    display: flex;
    gap: 8px;
  }
  .feedback-btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--fg);
    font-size: 0.9rem;
    cursor: pointer;
  }
  .feedback-btn:hover { border-color: var(--accent); }
  .feedback-btn.selected {
    border-color: var(--accent);
    background: var(--accent-bg);
    font-weight: bold;
  }
</style>
</head>
<body>
<main>
  <h1>カスタマーサポート回答補助ツール</h1>

  <!--
    経路選択：4つの選択軸。各軸は独立し、同一軸内では1つだけ選択できる。
    data-axis で軸を識別する。返信相手の軸のボタンだけ data-kind を持ち、
    出力欄の上のラベル切り替えに使う（user=ユーザー向け回答文 / customer=カスタマー向け説明文）。
  -->
  <section>
    <div class="section-label">経路を選ぶ</div>

    <div class="axis" data-axis="channel">
      <div class="axis-label">経路</div>
      <div class="options">
        <button type="button" class="opt-btn" data-value="mail">メール</button>
        <button type="button" class="opt-btn" data-value="phone">電話</button>
      </div>
    </div>

    <div class="axis" data-axis="agent">
      <div class="axis-label">決済代行</div>
      <div class="options">
        <button type="button" class="opt-btn" data-value="none">代行なし（素のキャリア）</button>
        <button type="button" class="opt-btn" data-value="gmo">GMO</button>
        <button type="button" class="opt-btn" data-value="sbpayment">Softbank Payment</button>
      </div>
    </div>

    <div class="axis" data-axis="method">
      <div class="axis-label">決済手段</div>
      <div class="options">
        <button type="button" class="opt-btn" data-value="docomo">docomo</button>
        <button type="button" class="opt-btn" data-value="au">au</button>
        <button type="button" class="opt-btn" data-value="softbank">softbank</button>
        <button type="button" class="opt-btn" data-value="creditcard">クレカ</button>
      </div>
    </div>

    <div class="axis" data-axis="recipient">
      <div class="axis-label">返信相手</div>
      <div class="options">
        <button type="button" class="opt-btn" data-value="user" data-kind="user">ユーザー向け</button>
        <button type="button" class="opt-btn" data-value="staff" data-kind="customer">折り返し担当向け</button>
      </div>
    </div>
  </section>

  <!-- 問い合わせ内容の貼り付け -->
  <section>
    <div class="section-label">問い合わせ内容</div>
    <!--
      個人情報保護: 入力文のマスク機能は「マスクを確認」ボタンで実装済み
      （メールアドレス・電話番号・カード番号を伏字化）。
      氏名・住所などのマスクは今後の追加対象。
      すべて画面内（JavaScript）で完結し、外部送信は行わない。
    -->
    <textarea id="inquiry" placeholder="問い合わせ内容をここに貼り付けてください"></textarea>

    <!-- マスク後プレビュー：入力欄の元の文章は書き換えず、別領域に伏字化した文章を表示する。初期は非表示。 -->
    <div id="maskBlock" style="display:none;">
      <div class="mask-notice">※ 個人情報を自動で伏字にしています。誤って隠れた箇所がないか確認してください</div>
      <div class="mask-preview" id="maskPreview"></div>
    </div>
  </section>

  <!-- 回答文の作成（この段階では生成しない） -->
  <section>
    <button type="button" class="primary-btn" id="generate">回答文を作成</button>
    <button type="button" class="secondary-btn" id="maskCheck">マスクを確認</button>
  </section>

  <!-- 出力欄 -->
  <section>
    <!-- 選んだ経路に応じてラベルを切り替える。未選択のときは非表示。 -->
    <div class="output-kind-label" id="outputKindLabel" style="display:none;"></div>
    <div class="output placeholder" id="output">（ここに回答文が表示されます）</div>
  </section>

  <!-- フィードバック -->
  <section>
    <div class="section-label">フィードバック</div>
    <div class="feedback" id="feedback">
      <button type="button" class="feedback-btn" data-feedback="good">よい</button>
      <button type="button" class="feedback-btn" data-feedback="fixed">直した</button>
    </div>
  </section>
</main>

<script>
  // 出力欄の上に出すラベル文言
  var KIND_LABELS = {
    user: "ユーザー向け回答文",
    customer: "カスタマー向け説明文"
  };

  var kindLabelEl = document.getElementById("outputKindLabel");

  // 選択軸ごとに単一選択。各軸の .options 内でクリックされたボタンだけ selected にする。
  // 軸どうしは独立で、互いの選択に影響しない。
  // 注意: 決済代行=GMO と 決済手段=au は実在しない組み合わせだが、
  //       今回は選択制限を設けず、運用で回避する方針。
  var axes = document.querySelectorAll(".axis");
  axes.forEach(function (axis) {
    axis.addEventListener("click", function (e) {
      var btn = e.target.closest(".opt-btn");
      if (!btn) return;

      var buttons = axis.querySelectorAll(".opt-btn");
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove("selected");
      }
      btn.classList.add("selected");

      // 返信相手の軸だけ、出力欄の上のラベル切り替えに紐づける。
      if (axis.getAttribute("data-axis") === "recipient") {
        var kind = btn.getAttribute("data-kind");
        kindLabelEl.textContent = KIND_LABELS[kind] || "";
        kindLabelEl.style.display = "block";
      }
    });
  });

  // 回答文を作成：この段階では生成せず、操作確認用の文言だけ出す
  document.getElementById("generate").addEventListener("click", function () {
    // NOTE: 本実装では、ここで入力文のマスク → 回答生成、の順に処理する予定。
    var outputEl = document.getElementById("output");
    outputEl.textContent = "（この段階では生成しません。操作確認用です）";
    outputEl.classList.remove("placeholder");
  });

  // 個人情報マスク：入力文をコピーして指定の項目を伏字に置換した文字列を返す。
  // すべて画面内で完結し、外部送信は行わない。元の入力文は書き換えない。
  function maskPII(text) {
    var masked = text;

    // メールアドレス（@ を含む一般的な形式）→ [メール]
    masked = masked.replace(/[^\s@]+@[^\s@]+\.[^\s@]+/g, "[メール]");

    // 数字のまとまり（ハイフン・空白区切りを含む連続数字列）を桁数で判定する。
    // カード番号(14〜16桁) と 電話番号(10〜11桁・先頭0) のみ置換し、
    // 注文番号・日付・金額などの短い数字（13桁以下）は誤って隠さないよう残す。
    masked = masked.replace(/\d[\d \-]*\d/g, function (run) {
      var digits = run.replace(/[ \-]/g, "");
      // カード番号らしい長い数字列（14〜16桁）
      if (digits.length >= 14 && digits.length <= 16) {
        return "[カード番号]";
      }
      // 電話番号（10〜11桁、先頭が0。090/080/070 等もこれに含まれる）
      if ((digits.length === 10 || digits.length === 11) && digits.charAt(0) === "0") {
        return "[電話番号]";
      }
      // 上記の桁数条件を満たさないものはそのまま
      return run;
    });

    return masked;
  }

  // マスクを確認：入力欄の文章を伏字化して、入力欄の下のプレビューに表示する。
  document.getElementById("maskCheck").addEventListener("click", function () {
    var inquiry = document.getElementById("inquiry").value;
    document.getElementById("maskPreview").textContent = maskPII(inquiry);
    document.getElementById("maskBlock").style.display = "block";
  });

  // フィードバック：1つだけ選択状態にする（記録の保存は後で実装）
  var feedbackEl = document.getElementById("feedback");
  feedbackEl.addEventListener("click", function (e) {
    var btn = e.target.closest(".feedback-btn");
    if (!btn) return;

    var buttons = feedbackEl.querySelectorAll(".feedback-btn");
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].classList.remove("selected");
    }
    btn.classList.add("selected");
  });
</script>
</body>
</html>
