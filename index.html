<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カスタマーサポート回答補助ツール</title>
<style>
  /* 装飾は最小限。読みやすさ優先のシンプルな見た目にする。 */
  :root {
    --fg: #1a1a1a;
    --muted: #666;
    --border: #ccc;
    --accent: #2563a8;
    --accent-bg: #e8f0fa;
    --bg: #fafafa;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    color: var(--fg);
    background: var(--bg);
    line-height: 1.7;
    margin: 0;
    padding: 24px 16px;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.25rem;
    margin: 0 0 20px;
  }
  section { margin-bottom: 24px; }
  .section-label {
    font-size: 0.9rem;
    font-weight: bold;
    margin-bottom: 8px;
  }

  /* 選択軸（各軸の中は単一選択、軸どうしは独立） */
  .axis { margin-bottom: 14px; }
  .axis:last-child { margin-bottom: 0; }
  .axis-label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .opt-btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--fg);
    font-size: 0.95rem;
    cursor: pointer;
  }
  .opt-btn:hover { border-color: var(--accent); }
  .opt-btn.selected {
    border-color: var(--accent);
    background: var(--accent-bg);
    font-weight: bold;
  }

  /* 入力欄 */
  textarea {
    width: 100%;
    min-height: 140px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.95rem;
    line-height: 1.6;
    resize: vertical;
  }

  /* メインの操作ボタン */
  .primary-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
  }
  .primary-btn:hover { opacity: 0.9; }

  /* マスク確認ボタン（補助操作なので控えめな見た目） */
  .secondary-btn {
    padding: 10px 20px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: #fff;
    color: var(--accent);
    font-size: 0.95rem;
    cursor: pointer;
    margin-left: 8px;
  }
  .secondary-btn:hover { background: var(--accent-bg); }

  /* マスク後プレビュー */
  .mask-notice {
    font-size: 0.8rem;
    color: #b45309;
    margin: 12px 0 6px;
  }
  .mask-preview {
    min-height: 80px;
    padding: 12px;
    border: 1px dashed var(--border);
    border-radius: 6px;
    background: #fff;
    white-space: pre-wrap;
    color: var(--fg);
  }

  /* 出力欄 */
  .output-kind-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .output {
    min-height: 120px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    white-space: pre-wrap;
    color: var(--fg);
  }
  .output.placeholder { color: var(--muted); }

  /* フィードバック */
  .feedback {
    display: flex;
    gap: 8px;
  }
  .feedback-btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--fg);
    font-size: 0.9rem;
    cursor: pointer;
  }
  .feedback-btn:hover { border-color: var(--accent); }
  .feedback-btn.selected {
    border-color: var(--accent);
    background: var(--accent-bg);
    font-weight: bold;
  }
</style>
</head>
<body>
<main>
  <h1>カスタマーサポート回答補助ツール</h1>

  <!--
    経路選択：4つの選択軸。各軸は独立し、同一軸内では1つだけ選択できる。
    data-axis で軸を識別する。返信相手の軸のボタンだけ data-kind を持ち、
    出力欄の上のラベル切り替えに使う（user=ユーザー向け回答文 / customer=カスタマー向け説明文）。
  -->
  <section>
    <div class="section-label">経路を選ぶ</div>

    <div class="axis" data-axis="channel">
      <div class="axis-label">経路</div>
      <div class="options">
        <button type="button" class="opt-btn" data-value="mail">メール</button>
        <button type="button" class="opt-btn" data-value="phone">電話</button>
      </div>
    </div>

    <!--
      決済：実在する組み合わせだけを並べた単一選択軸。
      data-value に機械可読な値を持たせ（後で記録を引くキーに使う）、表示ラベルとは分けている。
    -->
    <div class="axis" data-axis="payment">
      <div class="axis-label">決済</div>
      <div class="options">
        <button type="button" class="opt-btn" data-value="carrier-docomo">docomo</button>
        <button type="button" class="opt-btn" data-value="carrier-au">au</button>
        <button type="button" class="opt-btn" data-value="carrier-softbank">softbank</button>
        <button type="button" class="opt-btn" data-value="card-gmo">GMO</button>
        <button type="button" class="opt-btn" data-value="card-sbp">SBPS</button>
      </div>
    </div>

    <div class="axis" data-axis="recipient">
      <div class="axis-label">返信相手</div>
      <div class="options">
        <button type="button" class="opt-btn" data-value="user" data-kind="user">ユーザー向け</button>
        <button type="button" class="opt-btn" data-value="staff" data-kind="customer">折り返し担当向け</button>
      </div>
    </div>
  </section>

  <!-- 問い合わせ内容の貼り付け -->
  <section>
    <div class="section-label">問い合わせ内容</div>
    <!--
      個人情報保護: 入力文のマスク機能は「マスクを確認」ボタンで実装済み
      （メールアドレス・電話番号・カード番号を伏字化）。
      氏名・住所などのマスクは今後の追加対象。
      すべて画面内（JavaScript）で完結し、外部送信は行わない。
    -->
    <textarea id="inquiry" placeholder="問い合わせ内容をここに貼り付けてください"></textarea>

    <!-- マスク後プレビュー：入力欄の元の文章は書き換えず、別領域に伏字化した文章を表示する。初期は非表示。 -->
    <div id="maskBlock" style="display:none;">
      <div class="mask-notice">※ 個人情報を自動で伏字にしています。誤って隠れた箇所がないか確認してください</div>
      <div class="mask-preview" id="maskPreview"></div>
    </div>
  </section>

  <!-- 回答文の作成（この段階では生成しない） -->
  <section>
    <button type="button" class="primary-btn" id="generate">回答文を作成</button>
    <button type="button" class="secondary-btn" id="maskCheck">マスクを確認</button>
  </section>

  <!-- 出力欄 -->
  <section>
    <!-- 選んだ経路に応じてラベルを切り替える。未選択のときは非表示。 -->
    <div class="output-kind-label" id="outputKindLabel" style="display:none;"></div>
    <div class="output placeholder" id="output">（ここに回答文が表示されます）</div>
  </section>

  <!-- フィードバック -->
  <section>
    <div class="section-label">フィードバック</div>
    <div class="feedback" id="feedback">
      <button type="button" class="feedback-btn" data-feedback="good">よい</button>
      <button type="button" class="feedback-btn" data-feedback="fixed">直した</button>
    </div>
  </section>
</main>

<script>
  // 出力欄の上に出すラベル文言
  var KIND_LABELS = {
    user: "ユーザー向け回答文",
    customer: "カスタマー向け説明文"
  };

  var kindLabelEl = document.getElementById("outputKindLabel");

  // 選択軸ごとに単一選択。各軸の .options 内でクリックされたボタンだけ selected にする。
  // 軸どうしは独立で、互いの選択に影響しない。
  // 決済軸は実在する組み合わせだけを選択肢に並べているため、存在しない組み合わせは選べない。
  var axes = document.querySelectorAll(".axis");
  axes.forEach(function (axis) {
    axis.addEventListener("click", function (e) {
      var btn = e.target.closest(".opt-btn");
      if (!btn) return;

      var buttons = axis.querySelectorAll(".opt-btn");
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove("selected");
      }
      btn.classList.add("selected");

      // 返信相手の軸だけ、出力欄の上のラベル切り替えに紐づける。
      if (axis.getAttribute("data-axis") === "recipient") {
        var kind = btn.getAttribute("data-kind");
        kindLabelEl.textContent = KIND_LABELS[kind] || "";
        kindLabelEl.style.display = "block";
      }
    });
  });

  // 記録の索引（records/index.json）をページ読み込み時に取得して保持する。
  // AIや外部APIは使わず、同一サイトの静的JSONを fetch するだけ。
  var records = [];
  var recordsError = false; // 読み込み失敗フラグ（生成時に画面へ知らせる。画面は落とさない）
  fetch("records/index.json")
    .then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })
    .then(function (data) { records = data; })
    .catch(function () { recordsError = true; });

  // 指定軸で選択中（.selected）のボタンの data-value を返す。未選択なら null。
  function getSelectedValue(axisName) {
    var sel = document.querySelector('.axis[data-axis="' + axisName + '"] .opt-btn.selected');
    return sel ? sel.getAttribute("data-value") : null;
  }

  // 回答文を作成：選んだ決済・経路に該当する記録を索引から引き、候補として出力欄に並べる。
  document.getElementById("generate").addEventListener("click", function () {
    var outputEl = document.getElementById("output");
    outputEl.classList.remove("placeholder");

    // 索引の読み込みに失敗していたら、その旨だけ出して終了。
    if (recordsError) {
      outputEl.textContent = "記録の読み込みに失敗しました";
      return;
    }

    var payment = getSelectedValue("payment");
    var channel = getSelectedValue("channel");
    var recipient = getSelectedValue("recipient");

    // 決済が未選択なら絞り込めない（経路・返信相手の未選択は許容する）。
    if (!payment) {
      outputEl.textContent = "決済を選んでください";
      return;
    }

    // 絞り込み：決済が payment 配列に含まれること。
    // 経路が選択されていれば、その記録の channel 配列に含まれることも条件にする。
    var matched = records.filter(function (rec) {
      if (rec.payment.indexOf(payment) === -1) return false;
      if (channel && rec.channel.indexOf(channel) === -1) return false;
      return true;
    });

    if (matched.length === 0) {
      outputEl.textContent = "該当する記録がありません。policy.md の方針に沿って手動で作成してください";
      return;
    }

    // 該当記録を候補として縦に並べる（出力欄は white-space:pre-wrap なので改行で十分）。
    var blocks = matched.map(function (rec) {
      var lines = [];
      lines.push("#" + rec.id + " " + rec.title); // 見出し
      lines.push(rec.summary);                     // 要約

      if (recipient === "staff") {
        // 折り返し担当向け：定型文があれば出し、続けて担当向け注意を必ず出す。
        if (rec.user_reply) {
          lines.push(rec.user_reply);
        }
        lines.push("【担当向け注意】" + rec.staff_note);
      } else {
        // ユーザー向け（または返信相手が未選択）：staff_note は出さない。
        if (rec.user_reply) {
          lines.push(rec.user_reply);
        } else {
          lines.push("※この決済はユーザー向けの定型文がありません（返金可否などに注意。折り返し担当に確認）");
        }
      }
      return lines.join("\n");
    });

    // 候補どうしは区切り線で分ける。
    outputEl.textContent = blocks.join("\n----\n");
  });

  // 個人情報マスク：入力文をコピーして指定の項目を伏字に置換した文字列を返す。
  // すべて画面内で完結し、外部送信は行わない。元の入力文は書き換えない。
  function maskPII(text) {
    var masked = text;

    // メールアドレス（@ を含む一般的な形式）→ [メール]
    masked = masked.replace(/[^\s@]+@[^\s@]+\.[^\s@]+/g, "[メール]");

    // 数字のまとまり（ハイフン・空白区切りを含む連続数字列）を桁数で判定する。
    // カード番号(14〜16桁) と 電話番号(10〜11桁・先頭0) のみ置換し、
    // 注文番号・日付・金額などの短い数字（13桁以下）は誤って隠さないよう残す。
    masked = masked.replace(/\d[\d \-]*\d/g, function (run) {
      var digits = run.replace(/[ \-]/g, "");
      // カード番号らしい長い数字列（14〜16桁）
      if (digits.length >= 14 && digits.length <= 16) {
        return "[カード番号]";
      }
      // 電話番号（10〜11桁、先頭が0。090/080/070 等もこれに含まれる）
      if ((digits.length === 10 || digits.length === 11) && digits.charAt(0) === "0") {
        return "[電話番号]";
      }
      // 上記の桁数条件を満たさないものはそのまま
      return run;
    });

    return masked;
  }

  // マスクを確認：入力欄の文章を伏字化して、入力欄の下のプレビューに表示する。
  document.getElementById("maskCheck").addEventListener("click", function () {
    var inquiry = document.getElementById("inquiry").value;
    document.getElementById("maskPreview").textContent = maskPII(inquiry);
    document.getElementById("maskBlock").style.display = "block";
  });

  // フィードバック：1つだけ選択状態にする（記録の保存は後で実装）
  var feedbackEl = document.getElementById("feedback");
  feedbackEl.addEventListener("click", function (e) {
    var btn = e.target.closest(".feedback-btn");
    if (!btn) return;

    var buttons = feedbackEl.querySelectorAll(".feedback-btn");
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].classList.remove("selected");
    }
    btn.classList.add("selected");
  });
</script>
</body>
</html>
